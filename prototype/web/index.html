<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyWarrior Flight Prototype</title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #0a1628; font-family: system-ui, sans-serif; color: #8fd4e8; }
    canvas { display: block; width: 100vw; height: 100vh; }
    #hud {
      position: fixed; inset: 0; pointer-events: none;
      display: grid; grid-template-columns: 1fr 280px; grid-template-rows: 1fr auto;
    }
    .radar {
      align-self: end; justify-self: start; margin: 24px;
      width: 160px; height: 160px; border: 2px solid #3a8fa8; border-radius: 50%;
      background: rgba(0,20,40,0.6); position: relative;
    }
    .radar::after {
      content: ''; position: absolute; inset: 50% auto auto 50%;
      width: 4px; height: 4px; background: #fff; border-radius: 50%;
      transform: translate(-50%, -50%);
    }
    .stats {
      align-self: end; justify-self: end; margin: 24px; text-align: right;
      font-variant-numeric: tabular-nums; line-height: 1.6;
    }
    .objectives {
      grid-column: 1 / -1; padding: 12px 24px; background: rgba(0,0,0,0.45);
      border-top: 1px solid #2a6a80;
    }
    .lock-box {
      position: fixed; top: 50%; left: 50%; width: 80px; height: 80px;
      border: 2px solid transparent; transform: translate(-50%, -50%);
      transition: border-color 0.15s;
    }
    .lock-box.soft { border-color: #f0c040; }
    .lock-box.hard { border-color: #ff4040; }
    #help {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      font-size: 12px; opacity: 0.7;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="hud">
    <div class="radar" id="radar"></div>
    <div class="stats">
      <div>SPD <span id="spd">0</span> km/h</div>
      <div>ALT <span id="alt">0</span> m</div>
      <div>MSL <span id="msl">4</span></div>
      <div>LOCK <span id="lock">NONE</span></div>
    </div>
    <div class="objectives" id="objectives">OBJ: Destroy 2 fighters, 1 SAM — <span id="prog">0/3</span></div>
  </div>
  <div class="lock-box" id="lockBox"></div>
  <div id="help">W/S pitch · A/D roll · Q/E yaw · ↑↓ throttle · Space gun · F missile · R reset</div>
  <script type="module" src="flight.js"></script>
</body>
</html>
